<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>完全版テトリス</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>完全版テトリス</h1>

  <div class="game-container">
    <canvas id="board" width="240" height="480"></canvas>

    <div class="side-panel">
      <div class="panel-box">
        <h2>スコア</h2>
        <div id="score" class="score-value">0</div>
        <div>レベル: <span id="level">1</span></div>
        <div>ライン: <span id="lines">0</span></div>
      </div>

      <div class="panel-box">
        <h2>次のブロック</h2>
        <canvas id="next" width="80" height="80"></canvas>
      </div>

      <div class="panel-box">
        <h2>ホールド</h2>
        <canvas id="hold" width="80" height="80"></canvas>
      </div>

      <div class="panel-box">
        <h2>ランキング（ローカル）</h2>
        <ul id="ranking"></ul>
      </div>

      <div class="panel-box">
        <h2>スキン</h2>
        <select id="skin-select">
          <option value="classic">クラシック</option>
          <option value="neon">ネオン</option>
          <option value="dark">ダーク</option>
        </select>
      </div>

      <div class="mobile-controls">
        <button class="btn" id="btn-left">←</button>
        <button class="btn" id="btn-right">→</button>
        <button class="btn" id="btn-down">↓</button>
        <button class="btn" id="btn-rotate">回転</button>
        <button class="btn" id="btn-drop">落下</button>
        <button class="btn" id="btn-hold">HOLD</button>
      </div>
    </div>
  </div>

  <div id="game-over" class="game-over hidden">
    <h2>ゲームオーバー</h2>
    <p id="final-score"></p>
    <button id="restart-btn">もう一度</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
